<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora — Welcome Back</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="auth-card">
    <div class="auth-header">
      <span class="logo">🌌</span>
      <h1>Welcome Back</h1>
      <p>Sign in to continue to Aurora</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        <span class="error-text" id="loginEmailError"></span>
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
        <span class="error-text" id="loginPasswordError"></span>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember me on this device</label>
      </div>

      <button type="submit" class="btn-primary">Sign In ✨</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
